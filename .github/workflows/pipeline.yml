name: Pipeline tests

on:
  pull_request:
    paths:
      - 'pipeline/**'
      - 'docker/Dockerfile.pipeline'
      - '.github/workflows/pipeline.yml'
  push:
    branches: [main]
    paths:
      - 'pipeline/**'
      - 'docker/Dockerfile.pipeline'
      - '.github/workflows/pipeline.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml
      - name: Install
        run: pip install -e '.[dev]'
      - name: Test (all synthetic — no real MESMER data needed)
        run: pytest
      - name: Smoke-run the full workflow on bundled data
        run: |
          provide-pipeline validate --data-dir data/mesmer \
            --shapefile data/countries.geojson --geographies data/geographies.csv
          provide-pipeline run-all --manifest manifest.example.yaml --dry-run

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build the batch-job image
        run: docker build -f docker/Dockerfile.pipeline -t provide-pipeline .
      - name: Image smoke test
        run: docker run --rm provide-pipeline --help
