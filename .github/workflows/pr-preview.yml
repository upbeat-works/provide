name: 🔄 PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  deployments: write

jobs:
  preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-22.04

    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v4

      - name: ⎔ Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📥 Download deps
        uses: bahmutov/npm-install@v1

      - name: 🏗️ Build app
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          BUILD_ENV: ${{ vars.BUILD_ENV }}
          VITE_DATA_API_URL: ${{ secrets.VITE_DATA_API_URL }}
          VITE_HEROKU_URL: ${{ secrets.VITE_HEROKU_URL }}
          VITE_STRAPI_LOCALE: ${{ vars.VITE_STRAPI_LOCALE }}
          VITE_MAPBOX_ACCESS_TOKEN: ${{ secrets.VITE_MAPBOX_ACCESS_TOKEN }}
          VITE_MAPBOX_STYLE_LIGHT: ${{ secrets.VITE_MAPBOX_STYLE_LIGHT }}
          VITE_MAPBOX_STYLE_SATELLITE: ${{ secrets.VITE_MAPBOX_STYLE_SATELLITE }}
          VITE_MAPBOX_STYLE_GLOBE: ${{ secrets.VITE_MAPBOX_STYLE_GLOBE }}
          VITE_MAPBOX_STYLE_STUDY_LOCATIONS: ${{ secrets.VITE_MAPBOX_STYLE_STUDY_LOCATIONS }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_SCREENSHOT_URL: ${{ secrets.VITE_SCREENSHOT_URL }}
          VITE_COMMIT_SHA: ${{ github.sha }}

      - name: 🧹 Sanitize branch name
        id: sanitize
        run: |
          # Convert branch name to lowercase and replace invalid characters
          SANITIZED_BRANCH=$(echo "${{ github.event.pull_request.head.ref }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          # Limit length to avoid Cloudflare naming issues and strip trailing hyphens
          SANITIZED_BRANCH=$(echo "$SANITIZED_BRANCH" | cut -c1-20 | sed 's/-*$//')
          echo "branch=$SANITIZED_BRANCH" >> $GITHUB_OUTPUT
          echo "alias=pr-${{ github.event.pull_request.number }}-$SANITIZED_BRANCH" >> $GITHUB_OUTPUT

      - name: 🚀 Deploy Preview to Cloudflare
        uses: cloudflare/wrangler-action@v3
        id: deploy
        with:
          command: deploy --name iiasa-sparccle-${{ steps.sanitize.outputs.alias }}
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}

      - name: 💬 Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;
            const sha = context.payload.pull_request.head.sha;
            const branch_name = context.payload.pull_request.head.ref;

            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr_number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🚀 **PR Preview**')
            );

            const alias = '${{ steps.sanitize.outputs.alias }}';
            const previewUrl = `https://iiasa-sparccle-${alias}.upbeat-sl.workers.dev`;

            const commentBody = `🚀 **PR Preview**\n\nYour changes have been deployed for preview.\n\n**🔗 Preview URL:** ${previewUrl}\n\n📋 **Details:**\n- Branch: \`${branch_name}\`\n- Commit: \`${sha}\`\n\n_This preview will update automatically with new commits._`;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr_number,
                body: commentBody
              });
            }
