name: 🧹 PR Preview Cleanup

on:
  # Tear down a PR's preview worker when the PR is merged or closed.
  pull_request:
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  teardown:
    name: 🗑️ Teardown Preview
    runs-on: ubuntu-22.04

    steps:
      - name: 🧹 Sanitize branch name
        id: sanitize
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -eu
          # MUST match pr-preview.yml exactly so we reconstruct the deployed name.
          SANITIZED_BRANCH=$(echo "$HEAD_REF" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/--*/-/g' | sed 's/^-\|-$//g')
          SANITIZED_BRANCH=$(echo "$SANITIZED_BRANCH" | cut -c1-20 | sed 's/-*$//')
          echo "alias=pr-${PR_NUMBER}-${SANITIZED_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: 🗑️ Delete preview worker
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER: iiasa-sparccle-${{ steps.sanitize.outputs.alias }}
        run: |
          set -eu
          echo "Deleting worker: $WORKER"
          code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" -X DELETE \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/workers/scripts/${WORKER}?force=true" \
            -H "Authorization: Bearer ${CF_API_TOKEN}")
          echo "HTTP $code"
          cat /tmp/resp.json || true
          echo
          if [ "$code" = "200" ] || [ "$code" = "404" ]; then
            echo "OK — worker deleted or already gone."
          else
            echo "Unexpected response deleting $WORKER"
            exit 1
          fi

      - name: 💬 Update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr_number,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('🚀 **PR Preview**')
            );

            const body = '🧹 **PR Preview removed**\n\nThe preview worker for this PR has been torn down.';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body,
              });
            }
