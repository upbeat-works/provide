# Dev reverse proxy: single origin (http://localhost:8080) in front of the
# compose services — mirrors the prod nginx routing.
#   /api/ -> Hono API    /cms/ -> Strapi    / -> SvelteKit (vite dev)

worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api { server api:8080; }
  upstream cms { server cms:1337; }
  upstream web { server web:5173; }

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;
  proxy_set_header Upgrade    $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # SvelteKit emits a large `Link: rel=modulepreload` header on chunk-heavy routes
  # (e.g. /impacts/explore), which overflows nginx's default 4k header buffer.
  proxy_buffer_size       16k;
  proxy_buffers           8 16k;
  proxy_busy_buffers_size 32k;

  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50m;

    # Hono catalog API — path preserved (app serves /api/*)
    location /api/ {
      proxy_pass http://api;
    }

    # Strapi under /cms — trailing slash strips the prefix (Strapi PUBLIC_URL=.../cms)
    location /cms/ {
      proxy_pass http://cms/;
    }

    # SvelteKit SPA (vite dev). HMR websocket also connects directly to :5173.
    location / {
      proxy_pass http://web;
    }
  }
}
