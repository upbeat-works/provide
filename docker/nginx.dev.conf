# Dev reverse proxy: name-based virtual hosts (mirrors nginx.prod.conf) in front
# of the compose services.
#   apex  localhost      ->  / -> SvelteKit (vite dev)   /api/ -> Hono API
#   sub   cms.localhost  ->  / -> Strapi (host root, no prefix strip)
# Open the app at http://localhost:8080 and the Strapi admin at
# http://cms.localhost:8080/admin (*.localhost resolves to loopback in browsers).

worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api { server api:8080; }
  upstream cms { server cms:1337; }
  upstream web { server web:5173; }

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_http_version 1.1;
  proxy_set_header Upgrade    $http_upgrade;
  proxy_set_header Connection $connection_upgrade;

  # SvelteKit emits a large `Link: rel=modulepreload` header on chunk-heavy routes
  # (e.g. /impacts/explore), which overflows nginx's default 4k header buffer.
  proxy_buffer_size       16k;
  proxy_buffers           8 16k;
  proxy_busy_buffers_size 32k;

  # CMS on its own subdomain (cms.localhost) — Strapi at the host root, no prefix
  # strip. `cms.*` matches any domain, so this mirrors nginx.prod.conf exactly.
  server {
    listen 80;
    server_name cms.*;
    client_max_body_size 50m;

    location / {
      proxy_pass http://cms;
    }
  }

  # Apex — the app (/) and the API (/api). default_server catches every host that
  # isn't cms.* (localhost here). HMR websocket also connects directly to :5173.
  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50m;

    # Hono catalog API — path preserved (app serves /api/*)
    location /api/ {
      proxy_pass http://api;
    }

    # SvelteKit SPA (vite dev)
    location / {
      proxy_pass http://web;
    }
  }
}
