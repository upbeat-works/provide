# Prod reverse proxy: single origin in front of the API and CMS, serving the
# built SvelteKit SPA as static files. Same routing as nginx.dev.conf — the only
# difference is `/` serves the prerendered/static build (mount the `build/` output
# at /usr/share/nginx/html, or bake it into the image) instead of proxying to the
# vite dev server.
#   /api/ -> Hono API    /cms/ -> Strapi    / -> static SPA
#
# Adjust the `api` / `cms` upstream host:port to your deploy target's service DNS.

worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile on;
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  upstream api { server api:8080; }
  upstream cms { server cms:1337; }

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_http_version 1.1;

  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50m;

    # Hono catalog API — path preserved (app serves /api/*)
    location /api/ {
      proxy_pass http://api;
    }

    # Strapi under /cms — trailing slash strips the prefix (Strapi PUBLIC_URL=.../cms)
    location /cms/ {
      proxy_pass http://cms/;
    }

    # Static SPA — build output mounted here; SPA fallback to index.html
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}
