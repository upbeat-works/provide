# Prod reverse proxy: name-based virtual hosts in front of the API, CMS and the
# SvelteKit SSR server (adapter-node, `node build`, default :3000). Same routing
# as nginx.dev.conf.
#   apex  DOMAIN      ->  / -> SvelteKit SSR    /api/ -> Hono API
#   sub   cms.DOMAIN  ->  / -> Strapi (host root, no prefix strip)
#
# `server_name cms.*` matches any domain (cms.localhost, cms.example.com), so this
# file stays domain-agnostic — point DNS for DOMAIN and cms.DOMAIN at this nginx.
# The SvelteKit server trusts X-Forwarded-* — run it with
# PROTOCOL_HEADER=x-forwarded-proto and HOST_HEADER=x-forwarded-host (or set ORIGIN).
# Adjust the api / cms / web upstream host:port to your deploy target's service DNS.

worker_processes auto;
events { worker_connections 1024; }

http {
  sendfile on;
  server_tokens off;

  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  upstream api { server api:8080; }
  upstream cms { server cms:1337; }
  upstream web { server web:3000; }

  proxy_set_header Host              $host;
  proxy_set_header X-Real-IP         $remote_addr;
  proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host  $host;
  proxy_http_version 1.1;

  # SvelteKit emits a large `Link: rel=modulepreload` header on chunk-heavy routes
  # (e.g. /impacts/explore), which overflows nginx's default 4k header buffer.
  proxy_buffer_size       16k;
  proxy_buffers           8 16k;
  proxy_busy_buffers_size 32k;

  # CMS on its own subdomain (cms.DOMAIN) — Strapi lives at the host root, so
  # there's no prefix to strip (Strapi PUBLIC_URL=https://cms.DOMAIN).
  server {
    listen 80;
    server_name cms.*;
    client_max_body_size 50m;

    location / {
      proxy_pass http://cms;
    }
  }

  # Apex — the app (/) and the API (/api). default_server catches every host that
  # isn't cms.* (DOMAIN / www.DOMAIN in prod, localhost locally).
  server {
    listen 80 default_server;
    server_name _;
    client_max_body_size 50m;

    # Hono catalog API — path preserved (app serves /api/*)
    location /api/ {
      proxy_pass http://api;
    }

    # SvelteKit SSR server
    location / {
      proxy_pass http://web;
    }
  }
}
