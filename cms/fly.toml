app = "provide-cms"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_FILENAME = "/data/data.db"

[mounts]
  source = "provide_cms_data"
  destination = "/data"

[http_service]
  internal_port = 1337
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/_health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
