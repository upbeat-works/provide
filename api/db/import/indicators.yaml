# Curated indicator enrichment (sector + legacy translation uid).
#
# `id` MUST equal the convention indicator name (the ixmp4 variable's first
# segment, as returned by GET /api/catalog). The values below are a best-effort
# PLACEHOLDER seeded from the legacy indicator LABEL — verify/replace each `id`
# against a live `/catalog` before relying on explore `sector` or the
# explore->avoid handoff. Because the /catalog join is additive, a mismatched
# `id` simply yields no enrichment for that indicator (never an error), and the
# avoid page works regardless (it uses the legacy uids directly).
#
# `legacyUid` = the frozen legacy /meta indicator uid (stable; from Appendix A).
# `sector`    = the legacy sector. Cities/avoid indicators are all urban-climate.

- id: Days a year with maximum temperatures above X°C
  sector: urban-climate
  legacyUid: urbclim-T2M-dayoverX
